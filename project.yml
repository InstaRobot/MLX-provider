name: MLX-provider
options:
  bundleIdPrefix: ai.instarobot
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_NAME: MLX-provider
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2024 InstaRobot. All rights reserved."
    INFOPLIST_KEY_CFBundleDisplayName: "MLX Provider"

targets:
  MLX-provider:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.instarobot.MLX-provider
        INFOPLIST_FILE: Sources/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleName: "MLX-provider"
        CFBundleDisplayName: "MLX Provider"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundlePackageType: APPL
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        LSMinimumSystemVersion: "15.0"
        LSApplicationCategoryType: "public.app-category.developer-tools"
        NSHumanReadableCopyright: "Copyright © 2024 InstaRobot. All rights reserved."
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSUIElement: false
